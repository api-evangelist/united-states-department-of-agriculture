naftiko: "1.0.0-alpha1"

info:
  label: "USDA NASS Quick Stats API"
  description: >-
    Access to USDA National Agricultural Statistics Service official published
    aggregate estimates for U.S. agricultural production including crops,
    livestock, economics, and demographics.
  tags:
    - Agriculture
    - Statistics
    - Crops
    - Livestock
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      NASS_API_KEY: NASS_API_KEY

capability:
  consumes:
    - type: http
      namespace: nass
      baseUri: https://quickstats.nass.usda.gov/api
      description: "USDA NASS Quick Stats API"
      authentication:
        type: apikey
        key: key
        value: "{{NASS_API_KEY}}"
        placement: query
      resources:
        - name: statistics
          path: /api_GET/
          description: "Query agricultural statistics data"
          operations:
            - name: get-agricultural-statistics
              method: GET
              description: "Get Agricultural Statistics"
              inputParameters:
                - name: commodity_desc
                  in: query
                  type: string
                  required: false
                  description: "Commodity name (e.g. CORN, WHEAT)"
                - name: statisticcat_desc
                  in: query
                  type: string
                  required: false
                  description: "Statistics category"
                - name: year
                  in: query
                  type: string
                  required: false
                  description: "Survey year"
                - name: state_name
                  in: query
                  type: string
                  required: false
                  description: "State name"
                - name: agg_level_desc
                  in: query
                  type: string
                  required: false
                  description: "Geographic aggregation level"
                - name: format
                  in: query
                  type: string
                  required: false
                  description: "Response format (JSON, CSV, XML)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: parameter-values
          path: /get_param_values/
          description: "Look up valid values for a query parameter"
          operations:
            - name: get-parameter-values
              method: GET
              description: "Get Valid Parameter Values"
              inputParameters:
                - name: param
                  in: query
                  type: string
                  required: true
                  description: "Parameter name to look up values for"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: counts
          path: /get_counts/
          description: "Get record count for a query"
          operations:
            - name: get-record-count
              method: GET
              description: "Get Record Count"
              inputParameters:
                - name: commodity_desc
                  in: query
                  type: string
                  required: false
                  description: "Commodity to count records for"
                - name: year
                  in: query
                  type: string
                  required: false
                  description: "Year filter"
                - name: state_name
                  in: query
                  type: string
                  required: false
                  description: "State filter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: nass-rest
      resources:
        - path: /v1/statistics
          name: statistics
          description: "Query USDA agricultural statistics"
          operations:
            - method: GET
              name: get-statistics
              description: "Get agricultural production statistics"
              call: "nass.get-agricultural-statistics"
              with:
                commodity_desc: "rest.commodity"
                year: "rest.year"
                state_name: "rest.state"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: nass-mcp
      transport: http
      tools:
        - name: get-crop-statistics
          description: "Query USDA NASS for agricultural production statistics by commodity, year, and location"
          hints:
            readOnly: true
            idempotent: true
          call: "nass.get-agricultural-statistics"
          with:
            commodity_desc: "tools.commodity"
            year: "tools.year"
            state_name: "tools.state"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-parameter-values
          description: "Look up valid values for NASS Quick Stats query parameters"
          hints:
            readOnly: true
            idempotent: true
          call: "nass.get-parameter-values"
          with:
            param: "tools.param_name"
          outputParameters:
            - type: object
              mapping: "$."
