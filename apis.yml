description: >-
  The United States Department of Agriculture (USDA) is a federal agency responsible for developing and executing
  policies related to farming, agriculture, forestry, and food. The USDA works to ensure the sustainability and safety
  of America's food supply, while also supporting rural development and promoting economic growth in rural communities.
  USDA provides multiple public APIs including FoodData Central for nutrient data, NASS Quick Stats for agricultural
  statistics, ERS ARMS for farm economics, and NRCS AWDB for water and climate monitoring data.
